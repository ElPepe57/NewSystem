body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; font-variant-numeric: tabular-nums; }
.context-frame { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: white; border: 2px solid #86efac; border-radius: 12px; padding: 8px 16px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 12px; min-width: 580px; }
.context-icon { width: 32px; height: 32px; border-radius: 8px; background: #f0fdf4; color: #14532d; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.context-info { flex: 1; min-width: 0; }
.context-type { font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; color: #14532d; font-weight: 700; }
.context-title { font-size: 12px; font-weight: 700; color: #0f172a; }
.context-meta { font-size: 10px; color: #64748b; margin-top: 1px; }
.context-id { font-family: ui-monospace, monospace; font-size: 9px; background: #f1f5f9; color: #475569; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.skeleton {
  background: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
  background-size: 200% 100%;
